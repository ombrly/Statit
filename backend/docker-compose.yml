version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: statit_admin
      POSTGRES_PASSWORD: freshpassword123
      POSTGRES_DB: statit_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statit_admin -d statit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5433/statit_db
      - SPRING_DATASOURCE_USERNAME=statit_admin
      - SPRING_DATASOURCE_PASSWORD=freshpassword123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: