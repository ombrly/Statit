name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: statit_db
          POSTGRES_USER: statit_admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for Gradle
        run: chmod +x backend/gradlew

      - name: Build
        working-directory: backend
        run: ./gradlew build -x test

      - name: Run tests
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/statit_db
          DB_USERNAME: statit_admin
          DB_PASSWORD: testpassword
        run: ./gradlew test